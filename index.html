<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Precision</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f4f4f5;
            --text: #09090b;
            --sub: #71717a;
            --accent: #ef4444; /* Rouge Sport */
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête */
        header {
            width: 100%;
            max-width: 450px;
            padding: 40px 24px 20px;
            box-sizing: border-box;
        }

        .label-mini {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--sub);
        }

        /* Section Chrono Principale */
        .main-display {
            width: 100%;
            max-width: 450px;
            padding: 20px 24px;
            box-sizing: border-box;
            text-align: left;
        }

        #time {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin: 10px 0;
        }

        /* Grille de données */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background-color: #e4e4e7;
            width: 100%;
            border-top: 1px solid #e4e4e7;
            border-bottom: 1px solid #e4e4e7;
        }

        .data-cell {
            background-color: var(--bg);
            padding: 24px;
        }

        .val-big {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        /* Contrôles */
        .controls {
            width: 100%;
            max-width: 450px;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        .slider-group {
            margin-bottom: 30px;
        }

        input[type=range] {
            width: 100%;
            margin-top: 15px;
            accent-color: var(--text);
        }

        #mainBtn {
            width: 100%;
            background-color: var(--text);
            color: var(--bg);
            border: none;
            padding: 24px;
            border-radius: 0; /* Design carré plus pro */
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.2s;
        }

        #mainBtn:active {
            background-color: var(--accent);
        }

        /* Historique épuré */
        .history {
            width: 100%;
            max-width: 450px;
            padding: 0 24px 40px;
            box-sizing: border-box;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 0;
            border-bottom: 1px solid #f4f4f5;
        }

        /* Mode Debug caché */
        .debug-bar {
            opacity: 0.1;
            padding: 20px;
        }

        .btn-debug {
            border: 1px solid var(--text);
            background: none;
            padding: 5px 10px;
            font-size: 0.6rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div id="status" class="label-mini">● Système Prêt</div>
    </header>

    <main class="main-display">
        <div class="label-mini">Temps écoulé (s)</div>
        <div id="time">0.00</div>
    </main>

    <section class="data-grid">
        <div class="data-cell">
            <span class="label-mini">Vitesse</span>
            <span id="speed" class="val-big">0.0 <small>km/h</small></span>
        </div>
        <div class="data-cell">
            <span class="label-mini">Réaction</span>
            <span id="react" class="val-big">0.00 <small>s</small></span>
        </div>
    </section>

    <section class="controls">
        <div class="slider-group">
            <div style="display: flex; justify-content: space-between;">
                <span class="label-mini">Distance</span>
                <span class="label-mini" style="color: var(--text)"><span id="d-val">10</span> m</span>
            </div>
            <input type="range" id="dist" min="5" max="100" value="10" oninput="document.getElementById('d-val').innerText=this.value">
        </div>
        <button id="mainBtn" onclick="launch()">Démarrer Session</button>
    </section>

    <section class="history" id="history">
        <div class="label-mini" style="margin-bottom: 20px;">Historique Récent</div>
    </section>

    <div class="debug-bar">
        <button class="btn-debug" onclick="trigger('foot')">Simu Décollage</button>
        <button class="btn-debug" onclick="trigger('finish')">Simu Arrivée</button>
    </div>

    <script>
        let state = "IDLE", startTime, timer;
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function beep(f, d) {
            const o = audio.createOscillator(), g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d);
        }

        function launch() {
            state = "WAIT";
            document.getElementById('status').innerText = "○ En attente...";
            document.getElementById('status').style.color = "var(--accent)";
            
            setTimeout(() => {
                if(state !== "WAIT") return;
                beep(800, 200);
                startTime = performance.now();
                state = "RUN";
                document.getElementById('status').innerText = "● Course en cours";
                document.getElementById('status').style.color = "var(--text)";
                timer = setInterval(() => {
                    document.getElementById('time').innerText = ((performance.now()-startTime)/1000).toFixed(2);
                }, 40);
            }, 1000 + Math.random() * 2000);
        }

        function trigger(type) {
            if(state !== "RUN") return;
            if(type === 'foot') {
                const r = (performance.now() - startTime)/1000;
                document.getElementById('react').innerHTML = `${r.toFixed(2)} <small>s</small>`;
            } else {
                clearInterval(timer);
                const t = parseFloat(document.getElementById('time').innerText);
                const d = document.getElementById('dist').value;
                const v = ((d / t) * 3.6).toFixed(1);
                document.getElementById('speed').innerHTML = `${v} <small>km/h</small>`;
                addHistory(t, v);
                state = "IDLE";
                document.getElementById('status').innerText = "● Session Terminée";
            }
        }

        function addHistory(t, v) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'history-row';
            div.innerHTML = `<span style="font-weight:700">${t}s</span><span style="color:var(--sub)">${v} km/h</span>`;
            h.insertBefore(div, h.childNodes[2]);
        }
    </script>
</body>
</html>
