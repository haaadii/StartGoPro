<!-- ═══════════════════════════════════════════════════════════
     AJOUT 1 — HTML
     Dans la page #page-ath-set, colle cette card
     APRÈS la card "Liaison Coach" et AVANT la card "Apparence"
════════════════════════════════════════════════════════════ -->

<div class="card glass">
  <div class="ctitle">Test Son</div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <div>
      <div style="font-size:.86rem;font-weight:600;">Bip de départ</div>
      <div style="font-size:.72rem;color:var(--sub);margin-top:2px;">Teste le son 0002.mp3 de ton ESP32</div>
    </div>
    <button id="btn-test-bip" class="btn btn-ghost btn-sm" onclick="testBip()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      Tester le bip
    </button>
  </div>
  <div id="test-bip-status" style="margin-top:10px;font-size:.75rem;color:var(--sub);min-height:16px;"></div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     AJOUT 2 — JS
     Colle cette fonction dans ton <script> existant,
     n'importe où après la définition de l'objet BLE
════════════════════════════════════════════════════════════ -->

<script>
async function testBip() {
  const btn = document.getElementById('btn-test-bip');
  const status = document.getElementById('test-bip-status');

  if (BLE.on) {
    // ── Mode physique : l'ESP32 joue le vrai son ────────────
    if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }
    if (status) status.textContent = 'Envoi à l\'ESP32...';

    await BLE.send('TEST_BIP');

    // Feedback visuel 1.5s
    if (status) status.textContent = '✓ Son joué sur l\'ESP32';
    setTimeout(() => {
      if (btn)   { btn.disabled = false; btn.style.opacity = ''; }
      if (status) status.textContent = '';
    }, 1500);

  } else {
    // ── Mode simulation : bip Web Audio ────────────────────
    if (status) status.textContent = 'Mode simulation — son navigateur';
    playBip();
    setTimeout(() => { if (status) status.textContent = ''; }, 1500);
  }
}
</script>
